<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login WRCь</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/login.css">
</head>
<body>

<div class="page">
    <div class="topbar">
        <span class="logo">W<span class="accent">R</span>C</span>
    </div>

    <div class="body">
        <div class="card">

            <div id="form-state">
                <a href="home.html" class="back-btn">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
                    Back to homepage
                </a>
                <p class="headline">LOGIN IN ACCOUNT</p>


                <div class="inp-wrap">
                    <input type="email" id="email" placeholder="Email Address" autocomplete="email">
                    <span class="err-msg" id="email-err">&#9888; Введите корректный email</span>
                </div>

                <div class="inp-wrap">
                    <input type="password" id="password" placeholder="Password" autocomplete="current-password" class="has-eye">
                    <button class="eye-btn" id="eye-btn" type="button" aria-label="Показать пароль">&#128065;</button>
                    <span class="err-msg" id="pass-err">&#9888; Пароль не должен быть пустым</span>
                </div>

                <div class="forgot-row">
                    <a href="#">Forgot password?</a>
                </div>

                <button class="btn-login" id="login-btn" type="button">Log in</button>

                <div class="signup-row">
                    Don't have an account? <a href="#">Sign Up</a>
                </div>

                <div class="divider">
                    <div class="dline"></div>
                    <span class="dtxt">Or continue with</span>
                    <div class="dline"></div>
                </div>

                <div class="socials">
                    <a href="#" class="soc-btn" aria-label="Google">
                        <svg viewBox="0 0 24 24" fill="none">
                            <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
                            <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
                            <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
                            <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
                        </svg>
                    </a>
                    <a href="#" class="soc-btn" aria-label="Apple">
                        <svg viewBox="0 0 24 24" fill="white">
                            <path d="M17.05 20.28c-.98.95-2.05.8-3.08.35-1.09-.46-2.09-.48-3.24 0-1.44.62-2.2.44-3.06-.35C2.79 15.25 3.51 7.7 9.05 7.4c1.4.07 2.37.74 3.17.76 1.21-.24 2.37-.93 3.67-.84 1.58.13 2.77.76 3.54 1.94-3.23 1.95-2.77 6.29.61 7.47-.47 1.24-1.07 2.46-3 3.55zM12.03 7.25c-.15-2.23 1.66-4.07 3.74-4.25.29 2.58-2.34 4.5-3.74 4.25z"/>
                        </svg>
                    </a>
                </div>
            </div>

            <div class="success-state" id="success-state">
                <div class="success-icon">✓</div>
                <p class="success-title">LOGGED IN!</p>
                <p class="success-text">Welcome back. Redirecting to your dashboard...</p>
            </div>

        </div>
    </div>
</div>

</body>
</html>
